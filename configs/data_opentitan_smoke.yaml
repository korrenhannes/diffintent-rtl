repo:
  url: https://github.com/lowRISC/opentitan.git
  local_path: external/opentitan
paths:
  raw_candidates: data/raw/opentitan_rtl_commits_smoke.jsonl
  real_examples: data/processed/opentitan_real_examples_smoke.jsonl
  with_holes: data/processed/opentitan_with_holes_smoke.jsonl
  train_split: data/splits/smoke_train.jsonl
  val_split: data/splits/smoke_val.jsonl
  test_split: data/splits/smoke_test.jsonl
  discarded_examples: outputs/logs/discarded_examples_smoke.jsonl
  dataset_stats: outputs/metrics/dataset_stats_smoke.json
  label_distribution_figure: outputs/figures/smoke_dataset_label_distribution.png
  diff_length_distribution_figure: outputs/figures/smoke_diff_length_distribution.png
mining:
  strict_rtl_only: true
  max_commits: 100
  max_examples: 300
  max_rtl_files_per_commit: 3
  prefer_single_rtl_file: true
  max_diff_lines: 128
preprocessing:
  max_lines_per_diff: 64
  max_tokens_per_line: 32
  max_total_tokens_flat: 2048
  keep_context_lines: true
split:
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
